<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
  <title>ClipVerse</title>
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1 class="logo">ClipVerse</h1>
      <span class="badge">v1.0</span>
    </header>

    <div class="content">
      <div id="detected" class="detected hidden">
        <div class="platform-badge" id="platform-name"></div>
        <p class="url-text" id="page-url"></p>
      </div>

      <div id="status" class="status"></div>

      <button id="download-btn" class="download-btn">
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="btn-label">Download This Video</span>
        <span class="spinner hidden"></span>
      </button>

      <div class="or-divider">
        <span>or</span>
      </div>

      <div class="input-group">
        <input type="url" id="url-input" placeholder="Paste any video URL..." />
        <button id="parse-btn" class="parse-btn">Go</button>
      </div>

      <p class="shortcut-hint">Tip: Press Ctrl+Shift+D on any video page</p>
    </div>

    <footer class="footer">
      <a href="https://clipverse.com" target="_blank">clipverse.com</a>
      <span class="sep">&middot;</span>
      <a href="https://clipverse.com/pricing" target="_blank">Upgrade to Pro</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
